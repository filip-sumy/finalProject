spring.application.name=finalProject

spring.datasource.url=jdbc:h2:mem:appliancedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create

spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.profiles.active=dev

spring.sql.init.mode=always

spring.sql.init.data-locations=classpath:sql/manufacturer.sql,\
classpath:sql/client.sql,\
classpath:sql/employee.sql,\
classpath:sql/appliance.sql,\
classpath:sql/order.sql,\
classpath:sql/order_row.sql