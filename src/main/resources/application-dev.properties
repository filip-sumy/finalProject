spring.datasource.url=jdbc:h2:mem:appliancedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/manufacturer.sql,\
classpath:sql/client.sql,\
classpath:sql/employee.sql,\
classpath:sql/appliance.sql,\
classpath:sql/order.sql,\
classpath:sql/order_row.sql


spring.messages.basename=messages
spring.messages.encoding=UTF-8

server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false
server.error.include-stacktrace=never

logging.level.org.spring.finalproject=DEBUG
logging.level.org.springframework.security=INFO

# Dev-only JWT signing key (256-bit, base64). Replace in production.
jwt.secret=QXBwbGlhbmNlU3RvcmVKd3REZXZTZWNyZXRLZXkyMDI2IQ==
