<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head(#{order.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{order.title}">Orders</h2>

<!-- ================= SEARCH + PAGE SIZE ================= -->
<form method="get" th:action="@{/orders}" class="search-form">

    <!-- SEARCH -->
    <input type="text"
           name="search"
           th:value="${search}"
           th:placeholder="#{order.search}" />

    <button type="submit"
            th:text="#{order.search}">
        Search
    </button>

    <label th:text="#{table.size}">Size:</label>

    <!-- PAGE SIZE -->
    <select name="size" onchange="this.form.submit()">
        <option value="5" th:selected="${page.size == 5}">5</option>
        <option value="10" th:selected="${page.size == 10}">10</option>
        <option value="20" th:selected="${page.size == 20}">20</option>
        <option value="50" th:selected="${page.size == 50}">50</option>
    </select>

    <!-- сохраняем сортировку -->
    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="direction" th:value="${direction}">
</form>

<a th:href="@{/orders/create}" th:text="#{order.add}">Create Order</a>

<hr/>

<!-- ================= TABLE ================= -->
<table>

    <thead>
    <tr>
        <th>ID</th>

        <!-- CLIENT SORT -->
        <th>
            <a th:href="@{/orders(
                    page=0,
                    size=${page.size},
                    search=${search},
                    sort='client',
                    direction=${sort == 'client' and direction == 'asc' ? 'desc' : 'asc'}
                )}">
                <span th:text="#{order.client}">Client</span>
                <span th:if="${sort == 'client'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th th:text="#{client.firstname}">First Name</th>
        <th th:text="#{client.lastname}">Last Name</th>
        <!-- STATUS SORT -->
        <th>
            <a th:href="@{/orders(
                    page=0,
                    size=${page.size},
                    search=${search},
                    sort='status',
                    direction=${sort == 'status' and direction == 'asc' ? 'desc' : 'asc'}
                )}">
                <span th:text="#{order.status}">Status</span>
                <span th:if="${sort == 'status'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th th:text="#{table.actions}">Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.clientId}"></td>
        <td th:text="${order.client.firstName}"></td>
        <td th:text="${order.client.lastName}"></td>
        <td th:text="${order.status}"></td>

        <td>
            <a th:if="${order.status.name() == 'CREATED'}"
               th:href="@{/orders/edit/{id}(id=${order.id})}"
               th:text="#{action.edit}">Edit</a>

            <span sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">
                <form th:if="${order.status.name() == 'CREATED'}"
                      th:action="@{/orders/approve/{id}(id=${order.id})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit" th:text="#{order.approve}">Approve</button>
                </form>
            </span>

            <a th:if="${order.status.name() == 'CREATED'}"
               th:href="@{/orders/delete/{id}(id=${order.id})}"
               th:text="#{action.delete}">Delete</a>
        </td>
    </tr>
    </tbody>

</table>

<!-- ================= PAGINATION ================= -->
<div th:if="${page != null and page.totalPages > 1}" class="pagination">

    <!-- PREV -->
    <a th:if="${page.hasPrevious()}"
       th:href="@{/orders(
            page=${page.number - 1},
            size=${page.size},
            search=${search},
            sort=${sort},
            direction=${direction}
       )}">
        ← Previous
    </a>

    <span>
        Page <b th:text="${page.number + 1}"></b>
        /
        <span th:text="${page.totalPages}"></span>
    </span>

    <!-- NEXT -->
    <a th:if="${page.hasNext()}"
       th:href="@{/orders(
            page=${page.number + 1},
            size=${page.size},
            search=${search},
            sort=${sort},
            direction=${direction}
       )}">
        Next →
    </a>

</div>

</body>
</html>
