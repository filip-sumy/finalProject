<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head(#{order.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{order.title}">Orders</h2>

<a th:href="@{/orders/create}" th:text="#{order.add}">Create Order</a>

<table>
    <tr>
        <th th:text="#{table.id}">ID</th>
        <th th:text="#{order.client}">Client</th>
        <th th:text="#{order.status}">Status</th>
        <th th:text="#{table.actions}">Actions</th>
    </tr>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.clientId}"></td>
        <td th:text="${order.status}"></td>
        <td>
            <a th:if="${order.status.name() == 'CREATED'}"
               th:href="@{/orders/edit/{id}(id=${order.id})}"
               th:text="#{action.edit}">Edit</a>
            <span sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')">
                <form th:if="${order.status.name() == 'CREATED'}"
                      th:action="@{/orders/approve/{id}(id=${order.id})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit" th:text="#{order.approve}">Approve</button>
                </form>
            </span>
            <a th:if="${order.status.name() == 'CREATED'}"
               th:href="@{/orders/delete/{id}(id=${order.id})}"
               th:text="#{action.delete}">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
