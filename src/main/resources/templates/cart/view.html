<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(#{cart.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{cart.title}">Shopping Cart</h2>

<div th:if="${message}" class="alert alert-success" th:text="#{${message}}"></div>
<div th:if="${errorKey}" class="alert alert-error" th:text="#{${errorKey}}"></div>
<div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

<p class="hint">
    <a th:href="@{/shop}" th:text="#{shop.browse}">Continue shopping</a>
</p>

<div th:if="${#lists.isEmpty(items)}" class="hint" th:text="#{cart.empty}">Cart is empty</div>

<table th:if="${!#lists.isEmpty(items)}">
    <thead>
    <tr>
        <th th:text="#{appliance.name}">Name</th>
        <th th:text="#{appliance.price}">Price</th>
        <th th:text="#{appliance.quantity}">Quantity</th>
        <th th:text="#{order.stock.available}">In stock</th>
        <th th:text="#{order.total}">Total</th>
        <th th:text="#{table.actions}">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.applianceName}">Name</td>
        <td th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}">0</td>
        <td>
            <form th:action="@{/cart/update/{id}(id=${item.applianceId})}"
                  method="post"
                  class="inline-form">
                <input type="number" name="quantity" th:value="${item.quantity}"
                       min="1" th:max="${item.stockAvailable}" required/>
                <button type="submit" th:text="#{action.save}">Save</button>
            </form>
        </td>
        <td th:text="${item.stockAvailable}">0</td>
        <td th:text="${#numbers.formatDecimal(item.lineTotal, 1, 'COMMA', 2, 'POINT')}">0</td>
        <td>
            <form th:action="@{/cart/remove/{id}(id=${item.applianceId})}"
                  method="post"
                  class="inline-form">
                <button type="submit" th:text="#{cart.remove}">Remove</button>
            </form>
        </td>
    </tr>
    </tbody>
    <tfoot>
    <tr>
        <td colspan="4" th:text="#{cart.grand.total}">Grand total</td>
        <td colspan="2"
            th:text="${#numbers.formatDecimal(totalPrice, 1, 'COMMA', 2, 'POINT')}">0</td>
    </tr>
    </tfoot>
</table>

<form th:if="${!#lists.isEmpty(items)}"
      th:action="@{/cart/checkout}"
      method="post">
    <button type="submit" th:text="#{cart.checkout}">Place order</button>
</form>

</body>
</html>
