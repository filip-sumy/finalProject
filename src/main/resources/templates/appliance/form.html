<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(#{appliance.add})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{appliance.add}">Appliance Form</h2>

<form th:action="${editMode}
      ? @{/appliances/edit/{id}(id=${appliance.id})}
      : @{/appliances/create}"
      th:object="${appliance}"
      method="post">

    <div>
        <label th:text="#{appliance.name}">Name</label>
        <input type="text" th:field="*{name}"/>
        <span class="error-field" th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}"></span>
    </div>

    <div>
        <label th:text="#{appliance.model}">Model</label>
        <input type="text" th:field="*{model}"/>
    </div>

    <div>
        <label th:text="#{appliance.price}">Price</label>
        <input type="number" step="0.01" th:field="*{price}"/>
        <span class="error-field" th:if="${#fields.hasErrors('price')}"
              th:errors="*{price}"></span>
    </div>

    <div>
        <label th:text="#{appliance.quantity}">Quantity</label>
        <input type="number" th:field="*{quantity}"/>
        <span class="error-field" th:if="${#fields.hasErrors('quantity')}"
              th:errors="*{quantity}"></span>
    </div>

    <div>
        <label th:text="#{appliance.manufacturer}">Manufacturer</label>
        <select th:field="*{manufacturerId}">
            <option th:each="m : ${manufacturers}"
                    th:value="${m.id}"
                    th:text="${m.name}">
            </option>
        </select>
    </div>

    <br/>
    <button type="submit" th:text="#{action.save}">Save</button>
</form>

<br/>
<a th:href="@{/appliances}" th:text="#{action.back}">Back</a>

</body>
</html>
