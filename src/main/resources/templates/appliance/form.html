<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<h2>Appliance Form</h2>

<form th:action="${editMode}
      ? @{/appliances/edit/{id}(id=${appliance.id})}
      : @{/appliances/create}"
      th:object="${appliance}"
      method="post">

    <div>

        <label>Name</label>

        <input type="text"
               th:field="*{name}"/>

    </div>

    <br>

    <div>

        <label>Model</label>

        <input type="text"
               th:field="*{model}"/>

    </div>

    <br>

    <div>

        <label>Price</label>

        <input type="number"
               step="0.01"
               th:field="*{price}"/>

    </div>

    <br>

    <div>

        <label>Quantity</label>

        <input type="number"
               th:field="*{quantity}"/>

    </div>

    <br>

    <div>

        <label>Manufacturer</label>

        <select th:field="*{manufacturerId}">

            <option
                    th:each="m : ${manufacturers}"
                    th:value="${m.id}"
                    th:text="${m.name}">
            </option>

        </select>

    </div>

    <br>

    <button type="submit">
        Save
    </button>

</form>

</body>
</html>
