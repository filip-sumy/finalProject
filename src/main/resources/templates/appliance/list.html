<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(#{appliance.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{appliance.title}">Appliances</h2>

<form method="get" th:action="@{/appliances}">
    <input type="text" name="search" th:value="${search}" th:placeholder="#{appliance.search}"/>
    <button type="submit" th:text="#{appliance.search}">Search</button>
</form>

<a th:href="@{/appliances/create}" th:text="#{appliance.add}">Add Appliance</a>

<table>
    <tr>
        <th th:text="#{table.id}">ID</th>
        <th th:text="#{appliance.name}">Name</th>
        <th th:text="#{appliance.model}">Model</th>
        <th th:text="#{appliance.price}">Price</th>
        <th th:text="#{appliance.quantity}">Quantity</th>
        <th th:text="#{table.actions}">Actions</th>
    </tr>
    <tr th:each="a : ${appliances}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.name}"></td>
        <td th:text="${a.model}"></td>
        <td th:text="${a.price}"></td>
        <td th:text="${a.quantity}"></td>
        <td>
            <a th:href="@{/appliances/edit/{id}(id=${a.id})}"
               th:text="#{action.edit}">Edit</a>
            |
            <a th:href="@{/appliances/delete/{id}(id=${a.id})}"
               th:text="#{action.delete}">Delete</a>
        </td>
    </tr>
</table>

<div th:if="${page != null and page.totalPages > 1}">
    <span th:text="#{pagination.page}">Page</span>
    <span th:text="${page.number + 1}">1</span> /
    <span th:text="${page.totalPages}">1</span>
    <a th:if="${page.hasPrevious()}"
       th:href="@{/appliances(page=${page.number - 1},search=${search},sort=${sort},direction=${direction})}"
       th:text="#{pagination.prev}">Previous</a>
    <a th:if="${page.hasNext()}"
       th:href="@{/appliances(page=${page.number + 1},search=${search},sort=${sort},direction=${direction})}"
       th:text="#{pagination.next}">Next</a>
</div>

</body>
</html>
