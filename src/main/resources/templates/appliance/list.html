<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(#{appliance.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{appliance.title}">Appliances</h2>

<!-- ================= SEARCH + PAGE SIZE ================= -->
<form method="get" th:action="@{/appliances}" class="search-form">

    <!-- SEARCH -->
    <input type="text"
           name="search"
           th:value="${search}"
           th:placeholder="#{appliance.search}" />

    <button type="submit" th:text="#{appliance.search}">Search</button>

    <!-- PAGE SIZE -->
    <label>Size:</label>
    <select name="size" onchange="this.form.submit()">
        <option value="5" th:selected="${page.size == 5}">5</option>
        <option value="10" th:selected="${page.size == 10}">10</option>
        <option value="20" th:selected="${page.size == 20}">20</option>
        <option value="50" th:selected="${page.size == 50}">50</option>
    </select>

    <!-- сохраняем сортировку -->
    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="direction" th:value="${direction}">
</form>

<!-- ================= ADD BUTTON ================= -->
<a th:href="@{/appliances/create}" th:text="#{appliance.add}">Add Appliance</a>

<hr/>

<!-- ================= TABLE ================= -->
<table border="1">

    <thead>
    <tr>
        <th>ID</th>

        <!-- NAME SORT -->
        <th>
            <a th:href="@{/appliances(
                    page=0,
                    size=${page.size},
                    search=${search},
                    sort='name',
                    direction=${sort == 'name' and direction == 'asc' ? 'desc' : 'asc'}
                )}">
                Name
                <span th:if="${sort == 'name'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <!-- MODEL SORT -->
        <th>
            <a th:href="@{/appliances(
                    page=0,
                    size=${page.size},
                    search=${search},
                    sort='model',
                    direction=${sort == 'model' and direction == 'asc' ? 'desc' : 'asc'}
                )}">
                Model
                <span th:if="${sort == 'model'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <!-- PRICE SORT -->
        <th>
            <a th:href="@{/appliances(
                    page=0,
                    size=${page.size},
                    search=${search},
                    sort='price',
                    direction=${sort == 'price' and direction == 'asc' ? 'desc' : 'asc'}
                )}">
                Price
                <span th:if="${sort == 'price'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <!-- QUANTITY SORT -->
        <th>
            <a th:href="@{/appliances(
                    page=0,
                    size=${page.size},
                    search=${search},
                    sort='quantity',
                    direction=${sort == 'quantity' and direction == 'asc' ? 'desc' : 'asc'}
                )}">
                Quantity
                <span th:if="${sort == 'quantity'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th th:text="#{table.actions}">Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="a : ${appliances}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.name}"></td>
        <td th:text="${a.model}"></td>
        <td th:text="${a.price}"></td>
        <td th:text="${a.quantity}"></td>

        <td>
            <a th:href="@{/appliances/edit/{id}(id=${a.id})}"
               th:text="#{action.edit}">Edit</a>
            |
            <a th:href="@{/appliances/delete/{id}(id=${a.id})}"
               th:text="#{action.delete}">Delete</a>
        </td>
    </tr>
    </tbody>

</table>

<!-- ================= PAGINATION ================= -->
<div th:if="${page != null and page.totalPages > 1}" class="pagination">

    <!-- PREV -->
    <a th:if="${page.hasPrevious()}"
       th:href="@{/appliances(
            page=${page.number - 1},
            size=${page.size},
            search=${search},
            sort=${sort},
            direction=${direction}
       )}">
        ← Previous
    </a>

    <!-- INFO -->
    <span>
        Page <b th:text="${page.number + 1}"></b>
        /
        <span th:text="${page.totalPages}"></span>
    </span>

    <!-- NEXT -->
    <a th:if="${page.hasNext()}"
       th:href="@{/appliances(
            page=${page.number + 1},
            size=${page.size},
            search=${search},
            sort=${sort},
            direction=${direction}
       )}">
        Next →
    </a>

</div>

</body>
</html>
