<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(#{client.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{client.title}">Clients</h2>

<!-- ================= SEARCH + PAGE SIZE ================= -->
<form method="get" th:action="@{/clients}" class="search-form">

    <input type="text"
           name="search"
           th:value="${search}"
           th:placeholder="#{client.search}" />

    <button type="submit"
            th:text="#{client.search}">
        Search
    </button>

    <label th:text="#{pagination.size}">Size:</label>

    <select name="size" onchange="this.form.submit()">
        <option value="5" th:selected="${page.size == 5}">5</option>
        <option value="10" th:selected="${page.size == 10}">10</option>
        <option value="20" th:selected="${page.size == 20}">20</option>
        <option value="50" th:selected="${page.size == 50}">50</option>
    </select>

    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="direction" th:value="${direction}">

</form>


<a th:href="@{/clients/create}"
   th:text="#{client.add}">
    Add Client
</a>

<hr>

<table border="1">

    <thead>

    <tr>

        <th>ID</th>

        <th>
            <a th:href="@{/clients(
                page=0,
                size=${page.size},
                search=${search},
                sort='firstName',
                direction=${sort == 'firstName' and direction == 'asc' ? 'desc' : 'asc'}
            )}">
                <span th:text="#{client.firstname}">First Name</span>
                <span th:if="${sort == 'firstName'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th>
            <a th:href="@{/clients(
                page=0,
                size=${page.size},
                search=${search},
                sort='lastName',
                direction=${sort == 'lastName' and direction == 'asc' ? 'desc' : 'asc'}
            )}">
                <span th:text="#{client.lastname}">Last Name</span>
                <span th:if="${sort == 'lastName'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th>
            <a th:href="@{/clients(
                page=0,
                size=${page.size},
                search=${search},
                sort='email',
                direction=${sort == 'email' and direction == 'asc' ? 'desc' : 'asc'}
            )}">
                Email
                <span th:if="${sort == 'email'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th>
            <a th:href="@{/clients(
                page=0,
                size=${page.size},
                search=${search},
                sort='phone',
                direction=${sort == 'phone' and direction == 'asc' ? 'desc' : 'asc'}
            )}">
                <span th:text="#{client.phone}">Phone</span>
                <span th:if="${sort == 'phone'}"
                      th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th th:text="#{client.address}">Address</th>

        <th th:text="#{table.actions}">
            Actions
        </th>

    </tr>

    </thead>

    <tbody>

    <tr th:each="c : ${clients}">

        <td th:text="${c.id}"></td>
        <td th:text="${c.firstName}"></td>
        <td th:text="${c.lastName}"></td>
        <td th:text="${c.email}"></td>
        <td th:text="${c.phone}"></td>
        <td th:text="${c.address}"></td>

        <td>

            <a th:href="@{/clients/edit/{id}(id=${c.id})}"
               th:text="#{action.edit}">
                Edit
            </a>

            |

            <a th:href="@{/clients/delete/{id}(id=${c.id})}"
               th:text="#{action.delete}">
                Delete
            </a>

        </td>

    </tr>

    </tbody>

</table>

<!-- ================= PAGINATION ================= -->

<div th:if="${page.totalPages > 1}">

    <a th:if="${page.hasPrevious()}"
       th:href="@{/clients(
            page=${page.number-1},
            size=${page.size},
            search=${search},
            sort=${sort},
            direction=${direction}
       )}">
        ← Previous
    </a>

    <span>
        Page
        <b th:text="${page.number+1}"></b>
        /
        <span th:text="${page.totalPages}"></span>
    </span>

    <a th:if="${page.hasNext()}"
       th:href="@{/clients(
            page=${page.number+1},
            size=${page.size},
            search=${search},
            sort=${sort},
            direction=${direction}
       )}">
        Next →
    </a>

</div>

</body>
</html>
