<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(${editMode} ? #{employee.edit} : #{employee.add})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="${editMode} ? #{employee.edit} : #{employee.add}">Employee Form</h2>

<form th:action="${editMode}
      ? @{/employees/edit/{id}(id=${employee.id})}
      : @{/employees/create}"
      th:object="${employee}"
      method="post">

    <div>
        <label th:text="#{employee.firstname}">First Name</label>
        <input type="text" th:field="*{firstName}"/>
        <span class="error-field" th:if="${#fields.hasErrors('firstName')}"
              th:errors="*{firstName}"></span>
    </div>

    <div>
        <label th:text="#{employee.lastname}">Last Name</label>
        <input type="text" th:field="*{lastName}"/>
        <span class="error-field" th:if="${#fields.hasErrors('lastName')}"
              th:errors="*{lastName}"></span>
    </div>

    <div>
        <label th:text="#{employee.email}">Email</label>
        <input type="email" th:field="*{email}"/>
        <span class="error-field" th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"></span>
    </div>

    <div>
        <label th:text="#{employee.password}">Password</label>
        <input type="password" th:field="*{password}"/>
        <small th:if="${editMode}" th:text="#{employee.password.hint}"></small>
        <span class="error-field" th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"></span>
    </div>

    <div>
        <label th:text="#{employee.position}">Position</label>
        <input type="text" th:field="*{position}"/>
    </div>

    <div>
        <label th:text="#{employee.salary}">Salary</label>
        <input type="number" step="0.01" th:field="*{salary}"/>
        <span class="error-field" th:if="${#fields.hasErrors('salary')}"
              th:errors="*{salary}"></span>
    </div>

    <br/>
    <button type="submit" th:text="#{action.save}">Save</button>
</form>

<br/>
<a th:href="@{/employees}" th:text="#{action.back}">Back</a>

</body>
</html>
