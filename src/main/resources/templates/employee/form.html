<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<h2>Employee Form</h2>

<form th:action="${editMode}
      ? @{/employees/edit/{id}(id=${employee.id})}
      : @{/employees/create}"
      th:object="${employee}"
      method="post">

    <input type="text"
           th:field="*{firstName}"
           placeholder="First Name"/>

    <br><br>

    <input type="text"
           th:field="*{lastName}"
           placeholder="Last Name"/>

    <br><br>

    <input type="email"
           th:field="*{email}"
           placeholder="Email"/>

    <br><br>

    <input type="password"
           th:field="*{password}"
           placeholder="Password"/>

    <br><br>

    <input type="text"
           th:field="*{position}"
           placeholder="Position"/>

    <br><br>

    <input type="number"
           step="0.01"
           th:field="*{salary}"
           placeholder="Salary"/>

    <br><br>

    <button type="submit">
        Save
    </button>

</form>

</body>
</html>
