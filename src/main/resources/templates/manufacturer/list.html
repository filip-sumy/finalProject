<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(#{manufacturer.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{manufacturer.title}">Manufacturers</h2>

<a th:href="@{/manufacturers/create}" th:text="#{manufacturer.add}">Add Manufacturer</a>

<table>
    <tr>
        <th th:text="#{table.id}">ID</th>
        <th th:text="#{manufacturer.name}">Name</th>
        <th th:text="#{manufacturer.country}">Country</th>
        <th th:text="#{table.actions}">Actions</th>
    </tr>
    <tr th:each="manufacturer : ${manufacturers}">
        <td th:text="${manufacturer.id}"></td>
        <td th:text="${manufacturer.name}"></td>
        <td th:text="${manufacturer.country}"></td>
        <td>
            <a th:href="@{/manufacturers/edit/{id}(id=${manufacturer.id})}"
               th:text="#{action.edit}">Edit</a>
            |
            <a th:href="@{/manufacturers/delete/{id}(id=${manufacturer.id})}"
               th:text="#{action.delete}">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
