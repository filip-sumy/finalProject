<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(#{manufacturer.add})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<h2 th:text="#{manufacturer.add}">Manufacturer Form</h2>

<form th:action="${editMode}
      ? @{/manufacturers/edit/{id}(id=${manufacturer.id})}
      : @{/manufacturers/create}"
      th:object="${manufacturer}"
      method="post">

    <div>
        <label th:text="#{manufacturer.name}">Name</label>
        <input type="text" th:field="*{name}"/>
        <span class="error-field" th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}"></span>
    </div>

    <div>
        <label th:text="#{manufacturer.country}">Country</label>
        <input type="text" th:field="*{country}"/>
    </div>

    <br/>
    <button type="submit" th:text="#{action.save}">Save</button>
</form>

<br/>
<a th:href="@{/manufacturers}" th:text="#{action.back}">Back</a>

</body>
</html>
