<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manufacturer Form</title>
</head>

<body>

<h2>Manufacturer Form</h2>

<form th:action="@{/manufacturers/create}"
      th:object="${manufacturer}"
      method="post">

    <div>

        <label>Name</label>

        <input type="text"
               th:field="*{name}"/>

        <span
                th:if="${#fields.hasErrors('name')}"
                th:errors="*{name}">
        </span>

    </div>

    <br>

    <div>

        <label>Country</label>

        <input type="text"
               th:field="*{country}"/>

    </div>

    <br>

    <button type="submit">
        Save
    </button>

</form>

<br>

<a th:href="@{/manufacturers}">
    Back
</a>

</body>
</html>
